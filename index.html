<!DOCTYPE html>
<html style="height: 100%;">
    <head>
        <meta charset="utf-8">
        <title>Muura</title>

        <meta name=”twitter:card” content="summary" /> 
        <meta name=”twitter:site” content="@channelmuura" /> 
        <meta name=”twitter:title” content="Muura" /> 
        <meta name=”twitter:description” content="Channeling imagination. Visual effects and storytelling. Sydney, Australia."/> 
        <meta name=”twitter:image” content="https://muura.com.au/images/previewimage.png" />

        <meta property="og:title" content="Muura"/>
        <meta property="og:image" content="https://muura.com.au/images/previewimage.png"/>
        <meta property="og:description" content="Channeling imagination. Visual effects and storytelling. Sydney, Australia."/>
        <meta property="og:url" content="https://muura.com.au"/>
        <meta property="og:type" content="website"/>
      
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

        <meta name="description" content="Channeling imagination. Visual effects and storytelling. Sydney, Australia."/>

        <link href="stylesheet.css" rel="stylesheet" type="text/css"/>
        <link rel="icon" type="image/png" href="images/favicon.png"/>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
                const element = document.getElementById('bg');
                if (element){
                    if (isSafari) { 
                        element.classList.remove('grain');
                        element.classList.add('blur');
                    }
                }
            });
        </script>
    </head>

    <body>
        <svg width="0" height="0" aria-hidden="true">
            <filter id="grain" color-interpolation-filters="sRGB" primitiveUnits="objectBoundingBox">
                <feTurbulence type="fractalNoise" baseFrequency=".713" numOctaves="4"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" scale=".06" xChannelSelector="R"></feDisplacementMap>
                <feBlend in2="SourceGraphic"></feBlend>
            </filter>
        </svg>
        <svg id="bg" class="card grain" style="overflow:visible;">
            <linearGradient id="g01">
                <stop stop-color="#1a0ce5"></stop>
                <stop stop-color="#fc3531" offset="1"></stop>
            </linearGradient>
            <linearGradient id="g02">
                <stop stop-color="#fc3531" offset=".2"></stop>
                <stop stop-color="#f5fe7e" offset="1"></stop>
            </linearGradient>
            <g id="bg-container">
                <rect x="-5%" y="-5%" width="110%" height="110%" fill="#fff"></rect>
                <ellipse class="blob01" rx="45%" ry="45%" cx="-10%" fill="url(#g01)"></ellipse>
                <circle class="blob02" r="25%" cx="95%" cy="50%" fill="url(#g02)"></circle>
                <circle class="blob03" r="25%" cx="20%" cy="115%" fill="url(#g02)"></circle>
            </g>
        </svg>

        <div id="container">
            <div class="center">
                <h1>MUURA</h1>
                <h2>Channeling imagination.</h2>
                <h3>Visual effects and storytelling. Sydney, Australia.</h3>
            </div>
            <table id="footer" style="width: 100%;">
                <tr>
                    <td style="width: 33.33%; text-align: left; padding-left:1rem">© Muura 2026. All rights reserved.</td>
                    <td style="width: 33.33%; text-align: center;"><a href="https://instagram.com/channelmuura" target="_blank">@channelmuura</a></td>
                    <td style="width: 33.33%; text-align: right; padding-right:1rem;">Mura: Pathway (Ngunnawal)</td>
                </tr>
            </table>
        </div>
    </body>
</html>
